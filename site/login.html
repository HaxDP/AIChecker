<!doctype html>
<html lang="uk">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>AIChecker — Вхід</title>
   <link rel="stylesheet" href="/styles.css">
   <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
   <div class="space-bg"></div>
   <div id="app" class="app-shell login-shell">
      <section class="card glass login-card">
         <p class="kicker">AIChecker</p>
         <h1>Вхід у систему</h1>
         <p class="muted">Увійди через Google, щоб побачити класи, завдання та студентів.</p>
         <button id="googleLoginBtn" class="google-btn">Увійти за допомогою Google</button>
         <pre id="loginLog" class="log-compact"></pre>
      </section>
   </div>

   <script src="/login.js"></script>
</body>
</html>
