<!doctype html>
<html lang="uk">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>AIChecker — Кабінет</title>
   <link rel="stylesheet" href="/styles.css">
</head>
<body>
   <div class="space-bg"></div>
   <div id="app" class="app-shell">
      <header class="top glass">
         <div>
            <p class="kicker">AIChecker</p>
            <h1>Система перевірки робіт</h1>
         </div>
         <div id="userBox"></div>
      </header>

      <section id="dashboardSection" class="card glass">
         <h2>Класи</h2>
         <div id="classesList" class="list"></div>
      </section>

      <section id="tasksSection" class="card glass hidden">
         <h2 id="tasksTitle">Завдання класу</h2>
         <div id="tasksList" class="list"></div>
      </section>

      <section id="reviewSection" class="card glass hidden">
         <h2 id="reviewTitle">Перевірка робіт</h2>

         <div class="row form-row">
            <button id="pullBtn">Підтягнути репозиторії GitHub</button>
            <button id="sendGradesBtn">Надіслати оцінки в Classroom</button>
            <button id="sendCommentsBtn">Надіслати коментарі на email</button>
            <button id="exportZipBtn">Експортувати ZIP</button>
         </div>

         <table id="submissionsTable">
            <thead>
               <tr>
                  <th>Студент</th>
                  <th>Репозиторій</th>
                  <th>AI %</th>
                  <th>Плагіат %</th>
                  <th>Оцінка</th>
                  <th>Статус</th>
                  <th>Дії</th>
               </tr>
            </thead>
            <tbody></tbody>
         </table>
      </section>

      <section id="logSection" class="card glass">
         <h2>Події</h2>
         <pre id="logBox"></pre>
      </section>
   </div>

   <script src="/dashboard.js"></script>
</body>
</html>
