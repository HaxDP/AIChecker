name: C/C++ CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  package-release:
    name: Package Release (${{ matrix.os }})
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/AIChecker dist/
          tar -czf AIChecker-${{ github.ref_name }}-linux.tar.gz -C dist AIChecker

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          if (Test-Path "build/Release/AIChecker.exe") {
            Copy-Item "build/Release/AIChecker.exe" "dist/AIChecker.exe" -Force
          } elseif (Test-Path "build/AIChecker.exe") {
            Copy-Item "build/AIChecker.exe" "dist/AIChecker.exe" -Force
          } else {
            throw "AIChecker.exe was not found in expected build output paths."
          }
          Compress-Archive -Path "dist/AIChecker.exe" -DestinationPath "AIChecker-${{ github.ref_name }}-windows.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            AIChecker-${{ github.ref_name }}-linux.tar.gz
            AIChecker-${{ github.ref_name }}-windows.zip
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub Release
    needs: package-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la release-assets

          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" release-assets/* --clobber
          else
            gh release create "${{ github.ref_name }}" release-assets/* --generate-notes
          fi